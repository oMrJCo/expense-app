<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>บันทึกรายจ่ายสำรอง</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #f0efe9;
      --border: #e2e0d8;
      --text: #1a1916;
      --muted: #8a8880;
      --accent: #1a1916;
      --accent-fg: #ffffff;
      --danger: #c0392b;
      --success: #1a6b3a;
      --radius: 14px;
      --shadow: 0 1px 4px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans Thai', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      gap: 12px;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header-actions { display: flex; gap: 8px; }

    /* ── Layout ── */
    .main { max-width: 720px; margin: 0 auto; padding: 20px 16px 60px; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── Stat strip ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }
    .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .stat-val { font-size: 22px; font-weight: 700; }

    /* ── Form ── */
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    .field input, .field select {
      width: 100%; height: 42px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 12px;
      font: inherit;
      font-size: 15px;
      background: var(--surface2);
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .field input:focus, .field select:focus {
      border-color: var(--text);
      box-shadow: 0 0 0 3px rgba(26,25,22,.08);
    }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .date-chip {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      margin-bottom: 14px;
    }
    .date-chip span { color: var(--text); font-weight: 500; }

    /* ── Buttons ── */
    button { font: inherit; cursor: pointer; border: none; outline: none; }
    .btn {
      height: 40px; border-radius: 10px;
      padding: 0 16px; font-size: 14px; font-weight: 500;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: background .12s, transform .1s;
    }
    .btn:hover { background: var(--surface2); }
    .btn:active { transform: scale(.98); }
    .btn-primary {
      background: var(--accent); color: var(--accent-fg);
      border-color: var(--accent);
    }
    .btn-primary:hover { background: #333; border-color: #333; }
    .btn-full { width: 100%; height: 44px; font-size: 15px; }
    .btn-sm { height: 32px; padding: 0 12px; font-size: 13px; border-radius: 8px; }
    .btn-danger { color: var(--danger); border-color: #f5c6c3; }
    .btn-danger:hover { background: #fef2f2; }
    .btn-ghost { background: transparent; border: none; height: auto; padding: 0; color: var(--muted); font-size: 13px; }
    .btn-ghost:hover { color: var(--text); background: transparent; }

    /* ── Period tabs ── */
    .period-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .tab-btn {
      height: 34px; padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font: inherit; font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .tab-btn:hover { background: var(--surface2); color: var(--text); }
    .tab-btn.active {
      background: var(--accent); color: var(--accent-fg);
      border-color: var(--accent);
    }
    .custom-dates { display: none; margin-top: 12px; }
    .custom-dates.show { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ── Status bar ── */
    .status-bar {
      font-size: 13px; color: var(--muted);
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: 10px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }
    .status-bar.error { color: var(--danger); background: #fef2f2; border-color: #f5c6c3; }
    .status-bar.success { color: var(--success); background: #f0faf4; border-color: #a8d5b8; }

    /* ── Record list ── */
    .records-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .records-count { font-size: 13px; color: var(--muted); }
    .record-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .record-item:last-child { border-bottom: none; }
    .record-check { margin-top: 2px; width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; accent-color: var(--accent); }
    .record-body { flex: 1; min-width: 0; }
    .record-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .record-meta { font-size: 12px; color: var(--muted); margin-top: 2px; display: flex; gap: 8px; align-items: center; }
    .record-tag {
      display: inline-block; padding: 1px 8px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 999px; font-size: 11px; font-weight: 500; color: var(--muted);
    }
    .record-right { text-align: right; flex-shrink: 0; }
    .record-amount { font-size: 17px; font-weight: 700; }
    .record-actions-row { display: flex; gap: 6px; margin-top: 8px; }
    .empty-state {
      text-align: center; padding: 40px 20px;
      color: var(--muted); font-size: 14px;
    }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }

    /* ── Bulk bar ── */
    .bulk-bar {
      display: none; align-items: center; justify-content: space-between;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      margin-bottom: 12px; font-size: 13px;
    }
    .bulk-bar.show { display: flex; }

    /* ── Summary ── */
    .summary-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .summary-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px;
      background: var(--surface2);
      border-radius: 10px;
      font-size: 14px;
    }
    .summary-row-label { color: var(--muted); font-size: 12px; }
    .summary-row-val { font-weight: 700; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      display: none; align-items: flex-end; justify-content: center;
      z-index: 200; padding: 0;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 32px;
      width: 100%; max-width: 720px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }

    /* ── Add payTo ── */
    .payto-add-row { display: flex; gap: 8px; margin-top: 8px; }
    .payto-add-row input { flex: 1; }

    /* ── Filter row ── */
    .filter-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .filter-row input { flex: 1; }
    .filter-row select { width: 140px; flex-shrink: 0; }

    @media (min-width: 600px) {
      .summary-grid { grid-template-columns: repeat(3, 1fr); }
      .modal-overlay { align-items: center; padding: 20px; }
      .modal-sheet { border-radius: 20px; max-height: 80vh; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>รายจ่ายสำรอง</h1>
    <div class="header-actions">
      <button class="btn btn-sm" id="syncBtn">⟳ Sync</button>
      <button class="btn btn-sm btn-primary" id="exportBtn">↓ CSV</button>
    </div>
  </div>
</div>

<div class="main">

  <!-- Status -->
  <div class="status-bar" id="statusBar">พร้อมใช้งาน</div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">รายการ</div>
      <div class="stat-val" id="statCount">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">ยอดรวม</div>
      <div class="stat-val" id="statTotal">฿0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">ช่วงเวลา</div>
      <div class="stat-val" id="statPeriod" style="font-size:14px;padding-top:4px">เดือนนี้</div>
    </div>
  </div>

  <!-- Add form -->
  <div class="card">
    <div class="card-title">เพิ่มรายการใหม่</div>
    <div class="field">
      <label>จ่ายค่าอะไร</label>
      <input id="fItem" placeholder="เช่น ค่าน้ำมัน, ค่าอาหาร, ค่าขนส่ง" />
    </div>
    <div class="two-col">
      <div class="field">
        <label>จำนวนเงิน (บาท)</label>
        <input id="fAmount" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00" />
      </div>
      <div class="field">
        <label>จ่ายให้ใคร</label>
        <select id="fPayTo"></select>
      </div>
    </div>
    <div class="payto-add-row">
      <input id="fNewPayTo" placeholder="เพิ่มตัวเลือก "จ่ายให้ใคร"" />
      <button class="btn btn-sm" id="addPayToBtn">+ เพิ่ม</button>
    </div>
    <div class="date-chip" style="margin-top:14px">
      📅 วันที่บันทึก: <span id="todayDisplay"></span>
    </div>
    <button class="btn btn-primary btn-full" id="addBtn">บันทึกรายการ</button>
  </div>

  <!-- Period filter -->
  <div class="card">
    <div class="card-title">ช่วงเวลา</div>
    <div class="period-tabs">
      <button class="tab-btn" data-period="daily">วันนี้</button>
      <button class="tab-btn" data-period="weekly">สัปดาห์นี้</button>
      <button class="tab-btn active" data-period="monthly">เดือนนี้</button>
      <button class="tab-btn" data-period="all">ทั้งหมด</button>
      <button class="tab-btn" data-period="custom">กำหนดเอง</button>
    </div>
    <div class="custom-dates" id="customDates">
      <div class="field"><label>จากวันที่</label><input type="date" id="fFrom" /></div>
      <div class="field"><label>ถึงวันที่</label><input type="date" id="fTo" /></div>
    </div>
    <div class="filter-row">
      <input id="fKeyword" placeholder="🔍 ค้นหารายการ..." />
      <select id="fPayToFilter"></select>
    </div>
  </div>

  <!-- Records -->
  <div class="card">
    <div class="records-header">
      <div class="card-title" style="margin-bottom:0">รายการที่บันทึก</div>
      <span class="records-count" id="recordsCount"></span>
    </div>
    <div class="bulk-bar" id="bulkBar">
      <span id="bulkLabel">เลือก 0 รายการ</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" id="selectAllBtn">เลือกทั้งหมด</button>
        <button class="btn btn-sm btn-danger" id="deleteSelectedBtn">ลบที่เลือก</button>
      </div>
    </div>
    <div id="recordsList"></div>
  </div>

  <!-- Summary -->
  <div class="card">
    <div class="card-title">สรุปยอด</div>
    <div class="summary-grid" id="summaryGrid"></div>
  </div>

</div>

<!-- Edit modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal-sheet">
    <div class="modal-title">แก้ไขรายการ</div>
    <div class="field"><label>จ่ายค่าอะไร</label><input id="eItem" /></div>
    <div class="two-col">
      <div class="field"><label>จำนวนเงิน</label><input id="eAmount" type="number" inputmode="decimal" min="0" step="0.01" /></div>
      <div class="field"><label>จ่ายให้ใคร</label><select id="ePayTo"></select></div>
    </div>
    <div class="date-chip"><span id="eDateDisplay"></span></div>
    <div class="modal-actions">
      <button class="btn" id="cancelEditBtn">ยกเลิก</button>
      <button class="btn btn-primary" id="saveEditBtn">บันทึก</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// CONFIG — เปลี่ยน API_URL ตรงนี้
// ════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbzaYifkFruPWCV-B8k5g_Hz_ivBjgfwrZnkfbKZuDMP4sAqXyrQa2q3J-QfCKiWR_-0/exec';
const LS_RECORDS = 'exp_records_v1';
const LS_PAYTO   = 'exp_payto_v1';
const DEFAULT_PAYTO = ['ส่วนตัว', 'ออฟฟิศ'];

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let records   = [];
let payToOpts = [...DEFAULT_PAYTO];
let period    = 'monthly';
let selected  = new Set();
let editingId = null;

// ════════════════════════════════════════
// DATE HELPERS — ทำงานแบบ string เท่านั้น ไม่มีปัญหา timezone
// ════════════════════════════════════════
function today() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function toISO(d) {
  // รับ Date object → คืน YYYY-MM-DD ตาม local time
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function parseISO(str) {
  // รับ string YYYY-MM-DD → Date object ใน local time
  if (!str || str.length < 10) return null;
  const s = str.slice(0, 10);
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function weekRange() {
  const t = parseISO(today());
  const day = t.getDay();
  const mon = new Date(t); mon.setDate(t.getDate() - (day === 0 ? 6 : day - 1));
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  return { from: toISO(mon), to: toISO(sun) };
}

function monthRange() {
  const t = today();
  const [y, m] = t.split('-');
  const last = new Date(Number(y), Number(m), 0);
  return { from: `${y}-${m}-01`, to: toISO(last) };
}

function inRange(dateStr) {
  const d = (dateStr || '').slice(0, 10);
  if (!d) return false;
  if (period === 'daily') return d === today();
  if (period === 'weekly') { const r = weekRange(); return d >= r.from && d <= r.to; }
  if (period === 'monthly') { const r = monthRange(); return d >= r.from && d <= r.to; }
  if (period === 'all') return true;
  if (period === 'custom') {
    const from = document.getElementById('fFrom').value;
    const to   = document.getElementById('fTo').value;
    if (from && d < from) return false;
    if (to   && d > to)   return false;
    return true;
  }
  return true;
}

function fmtDate(str) {
  const d = parseISO(str);
  if (!d) return str || '-';
  return d.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
}

function fmtMoney(v) {
  return '฿' + Number(v || 0).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function periodLabel() {
  const map = { daily: 'วันนี้', weekly: 'สัปดาห์นี้', monthly: 'เดือนนี้', all: 'ทั้งหมด', custom: 'กำหนดเอง' };
  return map[period] || '';
}

// ════════════════════════════════════════
// LOCAL STORAGE
// ════════════════════════════════════════
function saveLocal() {
  try { localStorage.setItem(LS_RECORDS, JSON.stringify(records)); } catch(e) {}
  try { localStorage.setItem(LS_PAYTO, JSON.stringify(payToOpts)); } catch(e) {}
}

function loadLocal() {
  try { const r = JSON.parse(localStorage.getItem(LS_RECORDS)); if (Array.isArray(r)) records = r; } catch(e) {}
  try { const p = JSON.parse(localStorage.getItem(LS_PAYTO)); if (Array.isArray(p) && p.length) payToOpts = p; } catch(e) {}
}

// ════════════════════════════════════════
// API
// ════════════════════════════════════════
async function apiGet() {
  const res = await fetch(API_URL + '?action=list');
  const data = await res.json();
  if (!data.ok) throw new Error(data.message || 'api error');
  return data;
}

async function apiPost(body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.message || 'api error');
  return data;
}

function applyServerData(data) {
  if (Array.isArray(data.records)) {
    // normalize date จาก server ให้เป็น YYYY-MM-DD เสมอ
    records = data.records.map(r => ({
      ...r,
      date: normalizeDate(r.date),
    }));
  }
  if (Array.isArray(data.payToOptions) && data.payToOptions.length) payToOpts = data.payToOptions;
  saveLocal();
}

function normalizeDate(str) {
  if (!str) return today();
  const s = String(str).trim();
  // ถ้าเป็น YYYY-MM-DD แล้ว คืนตรงๆ
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // ไม่งั้น parse แล้ว convert
  const d = new Date(s);
  if (!isNaN(d.getTime())) return toISO(d);
  return today();
}

// ════════════════════════════════════════
// STATUS
// ════════════════════════════════════════
function setStatus(msg, type = '') {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = 'status-bar' + (type ? ' ' + type : '');
}

// ════════════════════════════════════════
// SYNC
// ════════════════════════════════════════
async function sync(showMsg = true) {
  setStatus('กำลัง sync...');
  try {
    const data = await apiGet();
    applyServerData(data);
    render();
    if (showMsg) setStatus('✓ sync สำเร็จ · ' + new Date().toLocaleTimeString('th-TH'), 'success');
    else setStatus('พร้อมใช้งาน');
  } catch(e) {
    setStatus('⚠ sync ไม่สำเร็จ · ใช้ข้อมูลในเครื่อง', 'error');
  }
}

// ════════════════════════════════════════
// ADD / EDIT / DELETE
// ════════════════════════════════════════
async function addRecord() {
  const item   = document.getElementById('fItem').value.trim();
  const amount = parseFloat(document.getElementById('fAmount').value);
  const payTo  = document.getElementById('fPayTo').value;
  if (!item)          { setStatus('⚠ กรุณาระบุรายการ', 'error'); return; }
  if (!amount || amount <= 0) { setStatus('⚠ กรุณาระบุจำนวนเงิน', 'error'); return; }
  if (!payTo)         { setStatus('⚠ กรุณาเลือกจ่ายให้ใคร', 'error'); return; }

  const rec = {
    id: crypto.randomUUID(),
    item, amount, payTo,
    date: today(),
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  };

  setStatus('กำลังบันทึก...');
  try {
    const data = await apiPost({ action: 'upsert_record', record: rec });
    applyServerData(data);
    document.getElementById('fItem').value = '';
    document.getElementById('fAmount').value = '';
    render();
    setStatus('✓ บันทึกสำเร็จ', 'success');
  } catch(e) {
    setStatus('⚠ บันทึกไม่สำเร็จ: ' + e.message, 'error');
  }
}

async function saveEdit() {
  const rec = records.find(r => r.id === editingId);
  if (!rec) return;
  const item   = document.getElementById('eItem').value.trim();
  const amount = parseFloat(document.getElementById('eAmount').value);
  const payTo  = document.getElementById('ePayTo').value;
  if (!item || !amount || amount <= 0 || !payTo) return;

  const updated = { ...rec, item, amount, payTo, updatedAt: new Date().toISOString() };
  setStatus('กำลังบันทึก...');
  try {
    const data = await apiPost({ action: 'upsert_record', record: updated });
    applyServerData(data);
    closeEdit();
    render();
    setStatus('✓ แก้ไขสำเร็จ', 'success');
  } catch(e) {
    setStatus('⚠ แก้ไขไม่สำเร็จ', 'error');
  }
}

async function deleteRecord(id) {
  setStatus('กำลังลบ...');
  try {
    const data = await apiPost({ action: 'delete_record', id });
    applyServerData(data);
    selected.delete(id);
    render();
    setStatus('✓ ลบสำเร็จ', 'success');
  } catch(e) {
    setStatus('⚠ ลบไม่สำเร็จ', 'error');
  }
}

async function deleteSelected() {
  if (!selected.size) return;
  setStatus('กำลังลบ...');
  try {
    const data = await apiPost({ action: 'delete_many', ids: [...selected] });
    applyServerData(data);
    selected.clear();
    render();
    setStatus('✓ ลบสำเร็จ', 'success');
  } catch(e) {
    setStatus('⚠ ลบไม่สำเร็จ', 'error');
  }
}

async function addPayTo() {
  const val = document.getElementById('fNewPayTo').value.trim();
  if (!val || payToOpts.includes(val)) return;
  const next = [...payToOpts, val];
  setStatus('กำลังอัปเดต...');
  try {
    const data = await apiPost({ action: 'set_payto_options', payToOptions: next });
    applyServerData(data);
    document.getElementById('fNewPayTo').value = '';
    renderPayToSelects(val);
    setStatus('✓ เพิ่มตัวเลือกสำเร็จ', 'success');
  } catch(e) {
    setStatus('⚠ เพิ่มตัวเลือกไม่สำเร็จ', 'error');
  }
}

// ════════════════════════════════════════
// EXPORT
// ════════════════════════════════════════
function exportCSV() {
  const rows = getFiltered();
  if (!rows.length) { setStatus('⚠ ไม่มีรายการให้ export', 'error'); return; }
  const hdr = ['วันที่', 'รายการ', 'จ่ายให้ใคร', 'จำนวนเงิน'];
  const lines = rows.map(r => [
    `"${r.date}"`,
    `"${String(r.item).replace(/"/g,'""')}"`,
    `"${String(r.payTo||'').replace(/"/g,'""')}"`,
    `"${Number(r.amount).toFixed(2)}"`,
  ].join(','));
  const csv = '\uFEFF' + hdr.join(',') + '\n' + lines.join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = `รายจ่าย_${periodLabel()}_${today()}.csv`;
  a.click();
}

// ════════════════════════════════════════
// FILTER
// ════════════════════════════════════════
function getFiltered() {
  const kw = document.getElementById('fKeyword').value.trim().toLowerCase();
  const pt = document.getElementById('fPayToFilter').value;
  return records
    .filter(r => inRange(r.date))
    .filter(r => !kw || (r.item || '').toLowerCase().includes(kw))
    .filter(r => pt === 'all' || r.payTo === pt)
    .sort((a, b) => (b.date > a.date ? 1 : b.date < a.date ? -1 : 0));
}

// ════════════════════════════════════════
// EDIT MODAL
// ════════════════════════════════════════
function openEdit(id) {
  const rec = records.find(r => r.id === id);
  if (!rec) return;
  editingId = id;
  document.getElementById('eItem').value   = rec.item;
  document.getElementById('eAmount').value = rec.amount;
  renderPayToSelects();
  document.getElementById('ePayTo').value  = rec.payTo || payToOpts[0] || '';
  document.getElementById('eDateDisplay').textContent = fmtDate(rec.date);
  document.getElementById('editModal').classList.add('open');
}
function closeEdit() {
  editingId = null;
  document.getElementById('editModal').classList.remove('open');
}

// ════════════════════════════════════════
// RENDER
// ════════════════════════════════════════
function renderPayToSelects(selectVal) {
  const opts = payToOpts.map(o => `<option value="${o}">${o}</option>`).join('');
  const allOpt = `<option value="all">ทั้งหมด</option>`;

  const fPayTo = document.getElementById('fPayTo');
  const prev = selectVal || fPayTo.value;
  fPayTo.innerHTML = opts;
  if (payToOpts.includes(prev)) fPayTo.value = prev;

  const fPayToFilter = document.getElementById('fPayToFilter');
  const prevF = fPayToFilter.value || 'all';
  fPayToFilter.innerHTML = allOpt + opts;
  fPayToFilter.value = prevF;

  const ePayTo = document.getElementById('ePayTo');
  ePayTo.innerHTML = opts;
}

function renderSummary(filtered) {
  const grid = document.getElementById('summaryGrid');
  const byDay = {}, byWeek = {}, byMonth = {};
  filtered.forEach(r => {
    const d = r.date.slice(0, 10);
    const m = d.slice(0, 7);
    const w = weekKeyOf(d);
    byDay[d] = (byDay[d] || 0) + Number(r.amount);
    byWeek[w] = (byWeek[w] || 0) + Number(r.amount);
    byMonth[m] = (byMonth[m] || 0) + Number(r.amount);
  });

  const rows = [
    ...Object.entries(byDay).sort((a,b) => b[0].localeCompare(a[0])).slice(0,3).map(([k,v]) => [fmtDate(k), v]),
    ...Object.entries(byWeek).sort((a,b) => b[0].localeCompare(a[0])).slice(0,2).map(([k,v]) => [`สัปดาห์ ${k}`, v]),
    ...Object.entries(byMonth).sort((a,b) => b[0].localeCompare(a[0])).slice(0,3).map(([k,v]) => {
      const d = parseISO(k + '-01');
      return [d ? d.toLocaleDateString('th-TH', { year: 'numeric', month: 'long' }) : k, v];
    }),
  ];

  if (!rows.length) { grid.innerHTML = '<div style="color:var(--muted);font-size:14px">ยังไม่มีข้อมูล</div>'; return; }
  grid.innerHTML = rows.map(([label, val]) => `
    <div class="summary-row">
      <span class="summary-row-label">${label}</span>
      <span class="summary-row-val">${fmtMoney(val)}</span>
    </div>`).join('');
}

function weekKeyOf(dateStr) {
  const d = parseISO(dateStr);
  if (!d) return dateStr;
  const day = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return toISO(mon);
}

function render() {
  document.getElementById('todayDisplay').textContent = fmtDate(today());
  renderPayToSelects();

  const filtered = getFiltered();
  const total = filtered.reduce((s, r) => s + Number(r.amount || 0), 0);
  document.getElementById('statCount').textContent = filtered.length;
  document.getElementById('statTotal').textContent = fmtMoney(total);
  document.getElementById('statPeriod').textContent = periodLabel();
  document.getElementById('recordsCount').textContent = filtered.length + ' รายการ';

  // bulk bar
  const bulkBar = document.getElementById('bulkBar');
  if (selected.size > 0) {
    bulkBar.classList.add('show');
    document.getElementById('bulkLabel').textContent = `เลือก ${selected.size} รายการ`;
  } else {
    bulkBar.classList.remove('show');
  }

  // records
  const list = document.getElementById('recordsList');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>ไม่มีรายการในช่วงเวลานี้</div>`;
  } else {
    list.innerHTML = filtered.map(r => `
      <div class="record-item">
        <input type="checkbox" class="record-check" data-id="${r.id}" ${selected.has(r.id) ? 'checked' : ''}>
        <div class="record-body">
          <div class="record-name">${esc(r.item)}</div>
          <div class="record-meta">
            <span>${fmtDate(r.date)}</span>
            <span class="record-tag">${esc(r.payTo || '-')}</span>
          </div>
          <div class="record-actions-row">
            <button class="btn btn-sm edit-btn" data-id="${r.id}">แก้ไข</button>
            <button class="btn btn-sm btn-danger del-btn" data-id="${r.id}">ลบ</button>
          </div>
        </div>
        <div class="record-right">
          <div class="record-amount">${fmtMoney(r.amount)}</div>
        </div>
      </div>`).join('');

    list.querySelectorAll('.record-check').forEach(cb => {
      cb.addEventListener('change', e => {
        const id = e.target.dataset.id;
        e.target.checked ? selected.add(id) : selected.delete(id);
        render();
      });
    });
    list.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', () => openEdit(btn.dataset.id));
    });
    list.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteRecord(btn.dataset.id));
    });
  }

  renderSummary(filtered);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════
// EVENTS
// ════════════════════════════════════════
document.getElementById('addBtn').addEventListener('click', addRecord);
document.getElementById('addPayToBtn').addEventListener('click', addPayTo);
document.getElementById('syncBtn').addEventListener('click', () => sync(true));
document.getElementById('exportBtn').addEventListener('click', exportCSV);
document.getElementById('cancelEditBtn').addEventListener('click', closeEdit);
document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
document.getElementById('editModal').addEventListener('click', e => { if (e.target === document.getElementById('editModal')) closeEdit(); });

document.getElementById('fKeyword').addEventListener('input', render);
document.getElementById('fPayToFilter').addEventListener('change', render);
document.getElementById('fFrom').addEventListener('change', render);
document.getElementById('fTo').addEventListener('change', render);

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    period = btn.dataset.period;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cd = document.getElementById('customDates');
    period === 'custom' ? cd.classList.add('show') : cd.classList.remove('show');
    render();
  });
});

document.getElementById('selectAllBtn').addEventListener('click', () => {
  const filtered = getFiltered();
  if (selected.size === filtered.length) selected.clear();
  else filtered.forEach(r => selected.add(r.id));
  render();
});

document.getElementById('deleteSelectedBtn').addEventListener('click', deleteSelected);

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
loadLocal();
render();
sync(false);
</script>
</body>
</html>
